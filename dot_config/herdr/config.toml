onboarding = false
[theme]
name = "catppuccin-latte"
auto_switch = false

[ui]
agent_panel_sort = "spaces"

show_agent_labels_on_pane_borders = true
[experimental]
switch_ascii_input_source_in_prefix = true
pane_history = true

[ui.toast]
delivery = "terminal"

[[keys.command]]
key = "prefix+up"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

[[keys.command]]
key = "prefix+down"
type = "plugin_action"
command = "cloudmanic.herdr-plus.quick-actions"
description = "herdr-plus: quick actions"

[[keys.command]]
description = "open command palette"
key = "prefix+space"
type = "plugin_action"
command = "ramarivera.palette.open"

[[keys.command]]
description = "open pretty which"
key = "prefix+w"
type = "plugin_action"
command = "ramarivera.pretty-which.open"
